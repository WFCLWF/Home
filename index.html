<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1a1a2e;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-hover: rgba(255, 255, 255, 0.12);
      --text: #e0e0e0;
      --text-secondary: #a0a0b8;
      --accent: #4285f4;
      --accent-hover: #5a9bf6;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(66, 133, 244, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(234, 67, 53, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(52, 168, 83, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ===== 时钟 ===== */
    .clock-section {
      text-align: center;
      margin-bottom: 48px;
    }

    .time {
      font-size: 80px;
      font-weight: 200;
      letter-spacing: -2px;
      color: #ffffff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-family: "SF Mono", "JetBrains Mono", "Cascadia Code", "Consolas", monospace;
    }

    .date {
      font-size: 18px;
      color: var(--text-secondary);
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* ===== 搜索引擎切换 ===== */
    .engine-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 4px;
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
    }

    .engine-tab {
      padding: 8px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.25s ease;
      border: none;
      background: transparent;
      white-space: nowrap;
    }

    .engine-tab:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
    }

    .engine-tab.active {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    /* ===== 搜索框 ===== */
    .search-container {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }

    .search-wrapper {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 6px;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
    }

    .search-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 4px 24px rgba(66, 133, 244, 0.2), var(--shadow);
      transform: translateY(-1px);
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
    }

    .search-icon {
      width: 22px;
      height: 22px;
      color: var(--text-secondary);
      flex-shrink: 0;
      transition: color 0.3s ease;
    }

    .search-wrapper:focus-within .search-icon {
      color: var(--accent);
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 18px;
      padding: 14px 0;
      letter-spacing: 0.5px;
    }

    #search-input::placeholder {
      color: #555;
    }

    .search-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .clear-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
    }

    .clear-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .clear-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .search-btn {
      padding: 10px 24px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }

    .search-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(66, 133, 244, 0.3);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    /* ===== 搜索建议 ===== */
    .suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: rgba(30, 30, 50, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: none;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .suggestions.show {
      display: block;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s ease;
      font-size: 15px;
      color: var(--text);
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(255, 255, 255, 0.08);
    }

    .suggestion-item .sug-icon {
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .suggestion-item .sug-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== 快捷链接 ===== */
    .shortcuts {
      display: flex;
      gap: 16px;
      margin-top: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .shortcut-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text);
      min-width: 80px;
      border: 1px solid transparent;
    }

    .shortcut-item:hover {
      background: var(--card-hover);
      border-color: var(--border);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .shortcut-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .shortcut-name {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      max-width: 88px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== 页脚 ===== */
    .footer {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 600px) {
      .time {
        font-size: 48px;
      }

      .search-container {
        max-width: 92vw;
      }

      #search-input {
        font-size: 16px;
        padding: 10px 0;
      }

      .search-btn {
        padding: 8px 16px;
        font-size: 13px;
      }

      .engine-tab {
        padding: 6px 12px;
        font-size: 12px;
      }

      .shortcuts {
        gap: 8px;
        margin-top: 32px;
      }

      .shortcut-item {
        padding: 12px 14px;
        min-width: 68px;
      }

      .shortcut-icon {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      .clock-section {
        margin-bottom: 32px;
      }
    }
  </style>
</head>
<body>

  <!-- 时钟 -->
  <div class="clock-section">
    <div class="time" id="time">00:00</div>
    <div class="date" id="date">2026年1月1日 星期四</div>
  </div>

  <!-- 搜索区域 -->
  <div class="search-container">
    <!-- 搜索引擎切换 -->
    <div class="engine-tabs">
      <button class="engine-tab active" data-engine="google">Google</button>
      <button class="engine-tab" data-engine="bing">Bing</button>
      <button class="engine-tab" data-engine="baidu">百度</button>
      <button class="engine-tab" data-engine="duckduckgo">DuckDuckGo</button>
    </div>

    <!-- 搜索框 -->
    <div style="position: relative;">
      <div class="search-wrapper">
        <div class="search-inner">
          <!-- Google 图标 -->
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="在 Google 上搜索"
            autofocus
            autocomplete="off"
          >
          <div class="search-actions">
            <button class="clear-btn" id="clear-btn" title="清空">✕</button>
            <button class="search-btn" id="search-btn">搜索</button>
          </div>
        </div>
      </div>

      <!-- 搜索建议 -->
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <!-- 快捷链接 -->
  <div class="shortcuts">
    <a class="shortcut-item" href="https://github.com" title="GitHub">
      <div class="shortcut-icon" style="background: #333;">🐙</div>
      <span class="shortcut-name">GitHub</span>
    </a>
    <a class="shortcut-item" href="https://www.youtube.com" title="YouTube">
      <div class="shortcut-icon" style="background: #ff0000;">▶</div>
      <span class="shortcut-name">YouTube</span>
    </a>
    <a class="shortcut-item" href="https://mail.google.com" title="Gmail">
      <div class="shortcut-icon" style="background: #ea4335;">✉</div>
      <span class="shortcut-name">Gmail</span>
    </a>
    <a class="shortcut-item" href="https://twitter.com" title="X / Twitter">
      <div class="shortcut-icon" style="background: #1da1f2;">𝕏</div>
      <span class="shortcut-name">X</span>
    </a>
    <a class="shortcut-item" href="https://www.reddit.com" title="Reddit">
      <div class="shortcut-icon" style="background: #ff4500;">🤖</div>
      <span class="shortcut-name">Reddit</span>
    </a>
    <a class="shortcut-item" href="https://maps.google.com" title="Google Maps">
      <div class="shortcut-icon" style="background: #34a853;">📍</div>
      <span class="shortcut-name">地图</span>
    </a>
  </div>

  <!-- 页脚 -->
  <div class="footer">按下 Enter 快速搜索 · Google 默认搜索引擎</div>

  <script>
    (function() {
      // ===== 搜索引擎配置 =====
      const engines = {
        google: {
          name: 'Google',
          searchUrl: 'https://www.google.com/search?q=',
          suggestUrl: 'https://suggestqueries.google.com/complete/search?client=chrome&q='
        },
        bing: {
          name: 'Bing',
          searchUrl: 'https://www.bing.com/search?q=',
          suggestUrl: null
        },
        baidu: {
          name: '百度',
          searchUrl: 'https://www.baidu.com/s?wd=',
          suggestUrl: 'https://suggestion.baidu.com/su?wd='
        },
        duckduckgo: {
          name: 'DuckDuckGo',
          searchUrl: 'https://duckduckgo.com/?q=',
          suggestUrl: null
        }
      };

      let currentEngine = localStorage.getItem('homepage-search-engine') || 'google';

      // ===== DOM 元素 =====
      const searchInput = document.getElementById('search-input');
      const searchBtn = document.getElementById('search-btn');
      const clearBtn = document.getElementById('clear-btn');
      const suggestionsEl = document.getElementById('suggestions');
      const engineTabs = document.querySelectorAll('.engine-tab');
      const timeEl = document.getElementById('time');
      const dateEl = document.getElementById('date');

      // ===== 初始化搜索引擎 =====
      function setEngine(engine) {
        currentEngine = engine;
        localStorage.setItem('homepage-search-engine', engine);
        searchInput.placeholder = `在 ${engines[engine].name} 上搜索`;

        engineTabs.forEach(tab => {
          tab.classList.toggle('active', tab.dataset.engine === engine);
        });
      }

      engineTabs.forEach(tab => {
        tab.addEventListener('click', () => setEngine(tab.dataset.engine));
      });

      setEngine(currentEngine);

      // ===== 执行搜索 =====
      function doSearch(query) {
        const q = query || searchInput.value.trim();
        if (!q) return;
        const url = engines[currentEngine].searchUrl + encodeURIComponent(q);
        window.location.href = url;
      }

      searchBtn.addEventListener('click', () => doSearch());
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          // 如果有选中的建议项，使用建议项文本
          const active = suggestionsEl.querySelector('.suggestion-item.active');
          if (active) {
            doSearch(active.querySelector('.sug-text').textContent);
          } else {
            doSearch();
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          moveSuggestion(1);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          moveSuggestion(-1);
        } else if (e.key === 'Escape') {
          suggestionsEl.classList.remove('show');
        }
      });

      // ===== 清除按钮 =====
      searchInput.addEventListener('input', () => {
        const hasText = searchInput.value.trim().length > 0;
        clearBtn.classList.toggle('visible', hasText);
        if (hasText) {
          fetchSuggestions(searchInput.value.trim());
        } else {
          suggestionsEl.classList.remove('show');
        }
      });

      clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        clearBtn.classList.remove('visible');
        suggestionsEl.classList.remove('show');
        searchInput.focus();
      });

      // ===== 搜索建议 =====
      let suggestionIndex = -1;
      let suggestionTimer = null;

      function moveSuggestion(direction) {
        const items = suggestionsEl.querySelectorAll('.suggestion-item');
        if (items.length === 0) return;

        items.forEach(item => item.classList.remove('active'));

        suggestionIndex += direction;
        if (suggestionIndex < 0) suggestionIndex = items.length - 1;
        if (suggestionIndex >= items.length) suggestionIndex = 0;

        const active = items[suggestionIndex];
        active.classList.add('active');
        searchInput.value = active.querySelector('.sug-text').textContent;
      }

      async function fetchSuggestions(query) {
        const engine = engines[currentEngine];
        if (!engine.suggestUrl || query.length < 1) {
          suggestionsEl.classList.remove('show');
          return;
        }

        clearTimeout(suggestionTimer);
        suggestionTimer = setTimeout(async () => {
          try {
            let suggestions = [];

            if (currentEngine === 'google') {
              const url = engine.suggestUrl + encodeURIComponent(query);
              const resp = await fetch(url);
              const data = await resp.json();
              suggestions = (data[1] || []).slice(0, 8);
            } else if (currentEngine === 'baidu') {
              const url = engine.suggestUrl + encodeURIComponent(query) + '&cb=jsonp';
              // 百度用 JSONP，这里用 fetch + proxy 方式不太方便，跳过
              suggestions = [];
            }

            if (suggestions.length > 0) {
              suggestionIndex = -1;
              suggestionsEl.innerHTML = suggestions.map((s, i) => `
                <div class="suggestion-item" data-index="${i}">
                  <svg class="sug-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                  </svg>
                  <span class="sug-text">${escapeHtml(s)}</span>
                </div>
              `).join('');
              suggestionsEl.classList.add('show');

              // 点击建议项
              suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                  doSearch(item.querySelector('.sug-text').textContent);
                });
              });
            } else {
              suggestionsEl.classList.remove('show');
            }
          } catch (e) {
            // 静默失败
            suggestionsEl.classList.remove('show');
          }
        }, 200);
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // 点击外部关闭建议
      document.addEventListener('click', (e) => {
        if (!suggestionsEl.contains(e.target) && e.target !== searchInput) {
          suggestionsEl.classList.remove('show');
        }
      });

      // ===== 时钟 =====
      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        timeEl.textContent = `${h}:${m}`;

        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const y = now.getFullYear();
        const mo = now.getMonth() + 1;
        const d = now.getDate();
        const w = weekdays[now.getDay()];
        dateEl.textContent = `${y}年${mo}月${d}日 ${w}`;
      }

      updateClock();
      setInterval(updateClock, 1000);

      // ===== 快捷链接可编辑 (双击编辑) =====
      document.querySelectorAll('.shortcut-item').forEach(item => {
        item.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const newUrl = prompt('修改链接地址:', item.href);
          if (newUrl) {
            item.href = newUrl;
            // 保存到 localStorage
            saveShortcuts();
          }
        });
      });

      function saveShortcuts() {
        const shortcuts = [];
        document.querySelectorAll('.shortcut-item').forEach(item => {
          shortcuts.push({
            name: item.querySelector('.shortcut-name').textContent,
            url: item.href,
            icon: item.querySelector('.shortcut-icon').innerHTML,
            bg: item.querySelector('.shortcut-icon').style.background
          });
        });
        localStorage.setItem('homepage-shortcuts', JSON.stringify(shortcuts));
      }

      // 加载保存的快捷方式
      function loadShortcuts() {
        const saved = localStorage.getItem('homepage-shortcuts');
        if (saved) {
          try {
            const shortcuts = JSON.parse(saved);
            const container = document.querySelector('.shortcuts');
            container.innerHTML = shortcuts.map(s => `
              <a class="shortcut-item" href="${escapeHtml(s.url)}" title="${escapeHtml(s.name)}">
                <div class="shortcut-icon" style="background: ${escapeHtml(s.bg || '#333')};">${s.icon}</div>
                <span class="shortcut-name">${escapeHtml(s.name)}</span>
              </a>
            `).join('');

            // 重新绑定右键
            container.querySelectorAll('.shortcut-item').forEach(item => {
              item.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const newUrl = prompt('修改链接地址:', item.href);
                if (newUrl) {
                  item.href = newUrl;
                  saveShortcuts();
                }
              });
            });
          } catch (e) { /* ignore */ }
        }
      }

      loadShortcuts();
    })();
  </script>
</body>
</html>
