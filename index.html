<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WW</title>
  <link rel="icon" href="static/图标.png" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 主内容区域 -->
  <div class="main-content">
    <!-- 居中内容组 -->
    <div class="center-group">
      <!-- 时钟 -->
      <div class="clock-section">
      <div class="time" id="time">00:00</div>
      <div class="date" id="date">2026年1月1日 星期四</div>
    </div>

    <!-- 搜索区域 -->
    <div class="search-container">
      <!-- 搜索引擎切换 -->
      <div class="engine-tabs">
        <button class="engine-tab active" data-engine="google">Google</button>
        <button class="engine-tab" data-engine="bing">Bing</button>
        <button class="engine-tab" data-engine="baidu">百度</button>
        <button class="engine-tab" data-engine="duckduckgo">DuckDuckGo</button>
      </div>

      <!-- 搜索框 -->
      <div style="position: relative;">
        <div class="search-wrapper">
          <div class="search-inner">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="在 Google 上搜索"
              autofocus
              autocomplete="off"
            >
            <div class="search-actions">
              <button class="clear-btn" id="clear-btn" title="清空">✕</button>
              <button class="search-btn" id="search-btn">搜索</button>
            </div>
          </div>
        </div>

        <!-- 搜索建议 -->
        <div class="suggestions" id="suggestions"></div>
      </div>
    </div>

    <!-- AI 输入框（搜索框下方） -->
    <div class="chat-input-container">
      <div class="chat-input-area">
        <input
          type="text"
          id="chat-input"
          placeholder="输入消息... (Enter 发送)"
          autocomplete="off"
        >
        <button class="chat-send-btn" id="chat-send-btn">发送</button>
      </div>
    </div>
    </div>
    <!-- 页脚 -->
    <div class="footer">按下 Enter 快速搜索 · Google 默认搜索引擎</div>
  </div>

  <!-- DeepSeek AI 聊天（右侧栏） -->
  <div class="deepseek-section" id="deepseek-section">
    <div class="deepseek-header">
      <span>💠 AI 助手</span>
    </div>
    <div class="deepseek-body">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">输入问题，开始对话</div>
      </div>
      <div class="chat-status" id="chat-status">就绪</div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/clock.js"></script>
  <script src="js/search.js"></script>

  <script src="js/chat.js"></script>
</body>
</html>
